version: "3.9"

services:
  blog:
    build: .
    container_name: blog
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/blog-MultiUtente
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: