http {

    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=2r/m;
    limit_req_zone $binary_remote_addr zone=post:10m rate=5r/m;

    server {
        listen 80;
        server_name alessio-be.longwavestudio.dev;
        return 301 https://$host$request_uri;
    }
}


server {
        server_name alessio-be.longwavestudio.dev;
        root /usr/local/repos/todolist-be;
        index index.html;
        add_header "Access-Control-Allow-Origin" "*" always;
        add_header "Access-Control-Allow-Methods" "PUT, POST, PATCH, DELETE, GET, OPTIONS, HEAD" always;
        if($request_method = "OPTIONS") {
            return 204 no-content;
        }
        location / {
            limit_req zone=general burst=40;
            proxy_pass http://localhost:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
        listen 443;
}